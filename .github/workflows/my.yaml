name: My Pipeline

on:
  push:
    branches:
    - main
jobs:
  MY_Jobs:
        name: deploying to docker
        runs-on:
        - ubuntu-latest
        steps:
          - name: Docker login
            uses: docker/login-action@v3
            with:
              Username: ${{secrets.USERNAME_DOCKER}}
              Password: ${{secrets.PASSWORD_DOCKER}}
              
          - name: Build Docker Image
            run: docker build -t sairampandu/life .
          - name: push Docker image
            run: docker push sairampandu/life
          - name: Deploy to EC2
            uses: appleboy/ssh-action@v1.0.0
          
            with:
              EC2_SSH_PRIVATE_KEY: ${{secrets.PRIVATE_KEY}}
              EC2_URL: ${{secrets.EC2_URL}}
              scripts: |
                docker pull sairampandu/life
                docker stop app || true
                docker rm app || true
                docker run  -d -p 80:80 --name app sairampandu/life
              
    
    
